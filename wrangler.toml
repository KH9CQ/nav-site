# Cloudflare 通过 Git 部署 Workers 时读取此文件
# 直接「上传静态文件」请不要上传本文件（或整包用 Git 连接）

name = "nav-site"
main = "worker.js"
compatibility_date = "2025-01-01"

# 静态页面与 Worker 同项目；/api/* 先走 worker.js
[assets]
directory = "."
binding = "ASSETS"
run_worker_first = ["/api/*"]

# 在 Dashboard 绑定同名资源（也可在此填 id 后用 CLI，网页部署可不填 id）：
# KV: NAV_KV
# Secret: ADMIN_PASSWORD
